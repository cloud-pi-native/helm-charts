{{- range .Values.application.repositories }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-%s-%s" $.Values.argocd.project .name (sha1sum .repoURL | trunc 4) | trunc 63 | trimSuffix "-" }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    app.kubernetes.io/managed-by: dso-console
    {{- $.Values.common | toYaml | nindent 4 }}
    dso/repository: {{ .name }}
    dso/repository.id: {{ .id }}
    dso/type: app
  annotations:
    argocd.argoproj.io/sync-wave: "4" # Force la suppression avant le AppProject
  finalizers:
    # foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}-app
  {{- if .valueSources }}
  {{- $externalSources := list }}
  {{- range .valueSources }}
    {{- if eq .type "external" }}
      {{- $externalSources = append $externalSources . }}
    {{- end }}
  {{- end }}
  sources:
    - repoURL: {{ .repoURL }}
      targetRevision: {{ .targetRevision }}
      path: {{ .path }}
      helm:
        valueFiles:
          {{- range .valueSources }}
          {{- if eq .type "internal" }}
          - {{ .path }}
          {{- else if eq .type "external" }}
          - ${{ .ref }}/{{ .path }}
          {{- end }}
          {{- end }}
    {{- range $externalSources }}
    - repoURL: {{ .repoURL }}
      targetRevision: {{ .targetRevision }}
      ref: {{ .ref }}
    {{- end }}
  {{- else }}
  source:
    repoURL: {{ .repoURL }}
    targetRevision:  {{ .targetRevision }}
    path: {{ .path }}
    {{- if len .valueFiles }}
    helm:
      valueFiles: {{ .valueFiles | toJson }}
    {{- end }}
  {{- end }}
  destination:
    name: {{ $.Values.application.destination.name }}
    namespace: {{ $.Values.application.destination.namespace }}
  {{- $autoSync := .autosync | default $.Values.application.autosync -}}
  {{- if $autoSync }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
  {{- end }}
{{- end }}
